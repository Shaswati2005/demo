services:
  # Database Service
  postgres:
    image: postgres:16-alpine
    container_name: exam-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: exam-help-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: YourSecureDbPassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # Spring Boot Backend Service
  backend:
    build: .
    container_name: exam-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/exam-help-db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=YourSecureDbPassword
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FILE_UPLOAD-DIR=/app/uploads
    volumes:
      - uploads_data:/app/uploads
    restart: always

volumes:
  pgdata:
  uploads_data:
